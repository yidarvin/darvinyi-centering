<!--
  Source for public/og-image.png (1200x630, the standard OG/Twitter card size).
  Colors match src/styles/tokens.ts (bg, teal). Regenerate with:
    sips -s format png scripts/assets/og-image-source.svg --out public/og-image.png
  (sips preserves the exact 1200x630 canvas; qlmanage does not, it force-crops
  to a square, so don't use it for this.)
-->
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0a0a0b"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <circle cx="600" cy="315" r="180" fill="none" stroke="#2dd4bf" stroke-opacity="0.55" stroke-width="1.5"/>
  <circle cx="600" cy="315" r="120" fill="none" stroke="#2dd4bf" stroke-opacity="0.35" stroke-width="1.5"/>
  <circle cx="600" cy="315" r="60" fill="#2dd4bf" fill-opacity="0.12" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="600" y="322" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" fill="#2dd4bf">calm</text>

  <text x="600" y="150" text-anchor="middle" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="600" fill="#e6e8ea">centering</text>
  <text x="600" y="520" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="26" fill="#9aa1a8" letter-spacing="0.5">the philosophies and practices of calm</text>
  <text x="600" y="565" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="17" fill="#5f666d">stoicism · buddhism · taoism · zen · yoga · ifs · and more</text>
</svg>
